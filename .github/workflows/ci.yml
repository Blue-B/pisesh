name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Syntax check (bin/pisesh)
        run: node --check bin/pisesh
      - name: Verify package metadata
        run: |
          node -e "
            const p = require('./package.json');
            if (!p.bin || !p.bin.pisesh) throw new Error('missing bin.pisesh');
            if (!p.pi || !p.pi.extensions || !p.pi.extensions.length) throw new Error('missing pi.extensions');
            console.log('package.json OK: v' + p.version);
          "
      - name: Verify --help works
        run: node bin/pisesh --help
